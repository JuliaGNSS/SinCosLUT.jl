name: CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']   # LTS (compat floor) and latest stable
        os:
          - ubuntu-latest        # x86_64: exercises AVX-512 / AVX2 / portable per the runner's CPU
          - macos-14             # Apple Silicon (AArch64): exercises the NEON tbl4 backend
        include:
          # ARM Linux runner (free for public repos) — also exercises the NEON backend.
          - version: '1'
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
