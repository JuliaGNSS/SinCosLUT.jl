name: Benchmarks

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2

      - name: Install AirspeedVelocity
        run: |
          julia -e 'using Pkg; Pkg.add("AirspeedVelocity"); Pkg.build("AirspeedVelocity")'
          echo "${HOME}/.julia/bin" >> "${GITHUB_PATH}"

      # Compare the PR head against the base branch using benchmark/benchmarks.jl
      - name: Run benchmarks
        run: |
          benchpkg \
            --rev="${{ github.event.pull_request.base.sha }},${{ github.event.pull_request.head.sha }}" \
            --bench-on="${{ github.event.pull_request.head.sha }}" \
            --output-dir=results --tune

      - name: Build comparison table
        run: |
          echo "## SinCosLUT benchmarks (base → PR)" > table.md
          echo "" >> table.md
          benchpkgtable --input-dir=results --ratio >> table.md

      - name: Find previous benchmark comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: SinCosLUT benchmarks

      - name: Post / update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: table.md
          edit-mode: replace

      - name: Also write to job summary
        if: always()
        run: cat table.md >> "${GITHUB_STEP_SUMMARY}"
