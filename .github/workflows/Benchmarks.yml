name: Benchmarks

# Uses the official AirspeedVelocity action, which clones the repo, builds the package
# at the PR base and head, runs benchmark/benchmarks.jl on each, and posts/updates a
# comparison table as a PR comment. It handles full-history checkout and result dirs
# internally (no manual benchpkg invocation needed). pull_request_target runs in the
# base-repo context so the comment-posting token has write permission.
on:
  pull_request_target:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write    # needed to post the benchmark comment
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: '1'
