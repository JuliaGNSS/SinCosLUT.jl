name: Documentation

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:

# Deploying builds (the `main` push and every tag push) all write to the same `gh-pages`
# branch, so they must NOT run concurrently — a tagged release fires the branch build and the
# tag build at once, and the second `git push` to `gh-pages` is rejected ("cannot lock ref").
# Route all deploys into one serialized, non-cancelling group so they queue and both finish;
# keep PR preview builds ref-scoped and cancellable (a new push supersedes the stale preview).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # deploy to gh-pages
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # gh-pages deploy
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}    # optional SSH deploy key
