[deps]
BenchmarkTools = "6e4b80f9-dd63-53aa-95a3-0cdb28fa8baf"
FastSinCos = "eb71ef10-bbd6-487f-97cc-2efbd12ad3c4"
FixedPointSinCosApproximations = "aedcc28f-63b5-4046-b467-b09cfa7c8db7"
SIMD = "fdea26ae-647d-5447-a871-4b548cad5224"
SinCosLUT = "59c743cf-042e-44de-8bbe-9da51d41dc19"

# SinCosLUT (this repo) is resolved from its path directly (Julia ≥ 1.11), so a bare
# `Pkg.instantiate()` sets everything up — no manual Pkg.develop in comparison.jl. All
# other deps (FastSinCos, FixedPointSinCosApproximations, …) are registered.
[sources]
SinCosLUT = {path = ".."}

# Pin to the SIMD builds (≥ 1.0); the 0.2.x FixedPoint line depended on
# LoopVectorization, which is unsatisfiable on recent Julia.
[compat]
FastSinCos = "1"
FixedPointSinCosApproximations = "1"
