# Only registered, conflict-free deps live here. comparison.jl's bootstrap installs the
# rest on first run: SinCosLUT (this repo, dev'd), FastSinCos (unregistered) and
# FixedPointSinCosApproximations 0.3.0 — all from GitHub. FixedPoint must NOT be listed
# here by UUID: its registered release (0.2.2) pulls LoopVectorization (unsatisfiable on
# recent Julia), and the resolver would pick it before the bootstrap can intervene.
[deps]
BenchmarkTools = "6e4b80f9-dd63-53aa-95a3-0cdb28fa8baf"
SIMD = "fdea26ae-647d-5447-a871-4b548cad5224"
